spring:
  application:
    name: ms-gestion
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Para correr local debes definir DB_URL/DB_USER/DB_PASS (ver .env.example en la raiz).
  # NO se publican defaults a Postgres para evitar credenciales hardcodeadas en el repo.
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: 10
      data-source-properties:
        stringtype: unspecified

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    schema:
      locations: classpath:graphql/

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

app:
  blockchain:
    base-url: ${BLOCKCHAIN_URL:http://localhost:3001}
    enabled: ${BLOCKCHAIN_ENABLED:true}
    timeout-seconds: 5
  supabase:
    # Si SUPABASE_JWKS_URI esta vacio, ms-gestion corre en modo DEV sin auth (todo permitAll).
    # En produccion: setear a https://<tu-proyecto>.supabase.co/auth/v1/.well-known/jwks.json
    jwks-uri: ${SUPABASE_JWKS_URI:}
    issuer: ${SUPABASE_ISSUER:}
  cors:
    # Permite localhost + cualquier IP de red local en :4200/:8081 (dev: probar desde celular)
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200,http://localhost:8081,http://192.168.*:4200,http://10.*:4200,http://172.*:4200}

logging:
  level:
    com.clinica.gestion: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
