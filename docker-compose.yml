services:
  postgres:
    image: postgres:16-alpine
    container_name: clinica_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-clinica}
      POSTGRES_PASSWORD: ${DB_PASS:-clinica}
      POSTGRES_DB: ${DB_NAME:-clinica_gestion}
    ports:
      - "5432:5432"
    volumes:
      - clinica_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-clinica} -d ${DB_NAME:-clinica_gestion}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: clinica_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@clinica.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - clinica_pgadmin_data:/var/lib/pgadmin

volumes:
  clinica_postgres_data:
  clinica_pgadmin_data:
