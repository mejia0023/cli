services:
  postgres:
    image: postgres:16-alpine
    container_name: clinica_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-clinica}
      POSTGRES_PASSWORD: ${DB_PASS:-clinica}
      POSTGRES_DB: ${DB_NAME:-ms_gestion}
      # DEV ONLY: confiar en cualquier conexion local; soluciona SCRAM auth de JDBC en Windows.
      # En produccion usar scram-sha-256 con password fuerte.
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      # 5432 esta ocupado en Windows por un Postgres nativo; usamos 5433 en el host
      - "5433:5432"
    volumes:
      - clinica_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-clinica} -d ${DB_NAME:-ms_gestion}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: clinica_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@clinica.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - clinica_pgadmin_data:/var/lib/pgadmin

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: clinica_dynamodb
    restart: unless-stopped
    # -sharedDb: una sola BD sin importar credenciales/region (ideal para dev)
    # -dbPath: persiste en el volumen (sin esto seria solo en memoria)
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    user: root
    ports:
      # 8000 lo usa Django (MS2); exponemos DynamoDB Local en 8001
      - "8001:8000"
    volumes:
      - clinica_dynamodb_data:/home/dynamodblocal/data

volumes:
  clinica_postgres_data:
  clinica_pgadmin_data:
  clinica_dynamodb_data:
